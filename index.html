<title>Pacific Northwest 2026</title>
<style>
:root{
  --bg:#f5f0e8;--surface:#fff;--s2:#ede8df;
  --acc:#bf7530;--acc-l:#fdf3e3;--acc-d:#8f5520;
  --t1:#1a0f05;--t2:#6b4e30;--t3:#a07850;
  --bdr:rgba(0,0,0,.09);
  --grn:#2a6048;--grn-l:#e4f2eb;
  --red:#b53025;--red-l:#fcebe9;
  --blu:#1a4a8a;--blu-l:#e6eef9;
  --r1:8px;--r2:12px;--r3:16px;--r4:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;color:var(--t1);max-width:600px;margin:0 auto}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}

/* Nav */
.nav{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:.5px solid var(--bdr);padding-top:env(safe-area-inset-top,0)}
.nav-in{display:flex;align-items:center;height:50px;padding:0 14px;gap:8px}
.nav-back{background:none;border:none;color:var(--acc);font-size:15px;padding:8px 6px 8px 0;display:flex;align-items:center;gap:3px;min-width:56px}
.nav-title{flex:1;text-align:center;font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-spc{min-width:56px}

/* Home header */
.home-hdr{background:var(--acc);color:#fff;padding:22px 18px 26px}
.hdr-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.75;margin-bottom:6px}
.hdr-title{font-size:27px;font-weight:700;font-family:Georgia,serif;line-height:1.15;margin-bottom:3px}
.hdr-dates{font-size:13px;opacity:.8;margin-bottom:20px}
.hdr-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:rgba(255,255,255,.18);border-radius:var(--r2);padding:10px 6px;text-align:center}
.stat-n{font-size:22px;font-weight:700;display:block}
.stat-l{font-size:9px;text-transform:uppercase;letter-spacing:.07em;opacity:.75}

/* Section header */
.sec-hdr{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;padding:14px 14px 5px}

/* Day list */
.day-list{padding:0 10px 80px;display:flex;flex-direction:column;gap:7px}
.day-card{background:var(--surface);border-radius:var(--r3);border:.5px solid var(--bdr);padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:opacity .15s}
.day-card:active{opacity:.65}
.dc-badge{width:44px;height:44px;border-radius:var(--r2);background:var(--acc-l);color:var(--acc);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.dc-badge.t-fly{background:var(--blu-l);color:var(--blu)}
.dc-badge.t-rest{background:var(--grn-l);color:var(--grn)}
.dc-n{font-size:15px;font-weight:700;line-height:1}
.dc-l{font-size:9px;font-weight:600;text-transform:uppercase;opacity:.7}
.dc-info{flex:1;min-width:0}
.dc-date{font-size:11px;color:var(--t3);margin-bottom:1px}
.dc-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dc-sub{font-size:12px;color:var(--t2);margin-top:2px}
.dc-arr{color:var(--t3);font-size:15px}

/* Day hero */
.day-hero{background:var(--acc);color:#fff;padding:14px 16px 18px}
.hero-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.72;margin-bottom:4px}
.hero-title{font-size:21px;font-weight:700;font-family:Georgia,serif;line-height:1.2}
.hero-route{font-size:13px;opacity:.8;margin-top:3px}

/* Tabs */
.tab-bar{display:flex;border-bottom:.5px solid var(--bdr);background:var(--surface);overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:68px;padding:11px 4px;background:none;border:none;border-bottom:2px solid transparent;font-size:12px;font-weight:500;color:var(--t3);white-space:nowrap;transition:color .15s}
.tab-btn.on{color:var(--acc);border-bottom-color:var(--acc)}

/* Content area */
.content{padding:14px;padding-bottom:80px;display:flex;flex-direction:column;gap:11px}

/* Card */
.card{background:var(--surface);border-radius:var(--r3);border:.5px solid var(--bdr);overflow:hidden}
.card-hdr{padding:11px 13px;border-bottom:.5px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.card-ttl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em}
.card-body{padding:13px;display:flex;flex-direction:column;gap:9px}

/* Info rows */
.ir{display:flex;align-items:baseline;gap:8px}
.ir-l{font-size:12px;color:var(--t3);min-width:82px;flex-shrink:0}
.ir-v{font-size:14px;font-weight:500}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:100px;font-size:13px;font-weight:600}
.badge.ok{background:var(--grn-l);color:var(--grn)}
.badge.no{background:var(--red-l);color:var(--red)}

/* Route stops */
.stop-list{display:flex;flex-direction:column;padding:0 4px}
.stop{display:flex;align-items:flex-start;gap:10px;padding:7px 0;position:relative}
.stop:not(:last-child)::after{content:'';position:absolute;left:9px;top:26px;bottom:0;width:1.5px;background:var(--bdr)}
.stop-dot{width:20px;height:20px;border-radius:50%;background:var(--acc-l);border:2px solid var(--acc);flex-shrink:0;margin-top:2px}
.stop-dot.f,.stop-dot.l{background:var(--acc)}
.stop-nm{font-size:14px;font-weight:500}
.stop-mi{font-size:12px;color:var(--t3)}

/* Highlights */
.hl{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-bottom:.5px solid var(--bdr)}
.hl:last-child{border-bottom:none;padding-bottom:0}
.hl:first-child{padding-top:0}
.hl-ico{font-size:22px;flex-shrink:0;width:30px;text-align:center;margin-top:1px}
.hl-nm{font-size:14px;font-weight:600;margin-bottom:2px}
.hl-ds{font-size:13px;color:var(--t2);line-height:1.5}

/* Expense inputs */
.ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ex-f label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px}
.ex-f input{width:100%;padding:9px 10px;border:.5px solid var(--bdr);border-radius:var(--r1);font-size:14px;background:var(--bg);color:var(--t1)}
.ex-f input:focus{outline:none;border-color:var(--acc)}

/* Mileage */
.mileage-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:0}
.fuel-cost{background:var(--blu-l);border-radius:var(--r1);padding:8px 12px;display:flex;justify-content:space-between;align-items:center}
.fuel-cost-lbl{font-size:11px;font-weight:700;color:var(--blu);text-transform:uppercase;letter-spacing:.07em}
.fuel-cost-val{font-size:15px;font-weight:700;color:var(--blu)}

/* Car overview */
.car-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.car-stat{background:var(--s2);border-radius:var(--r2);padding:10px 12px;text-align:center}
.car-stat-n{font-size:20px;font-weight:700;color:var(--t1);display:block}
.car-stat-l{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-top:2px}
.progress-bar{height:6px;background:var(--s2);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:var(--acc);border-radius:3px;transition:width .4s}

/* Weather */
.wx{display:inline-flex;align-items:center;gap:6px;background:var(--s2);padding:5px 11px;border-radius:100px;font-size:13px;color:var(--t2)}

/* Tip box */
.tip{background:var(--acc-l);border-radius:var(--r2);padding:11px 13px;border-left:3px solid var(--acc)}
.tip-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--acc-d);margin-bottom:3px}
.tip-txt{font-size:13px;color:var(--t1);line-height:1.5}

/* Expense entries */
.add-btn{background:var(--acc);color:#fff;border:none;border-radius:var(--r1);padding:4px 11px;font-size:12px;font-weight:600;cursor:pointer}
.add-btn:active{background:var(--acc-d)}
.entry-row{display:grid;grid-template-columns:1fr 82px 34px 30px;gap:6px;align-items:center}
.entry-desc,.entry-amt{padding:8px 10px;border:.5px solid var(--bdr);border-radius:var(--r1);font-size:13px;background:var(--bg);color:var(--t1);width:100%}
.entry-amt{text-align:right}
.entry-desc:focus,.entry-amt:focus{outline:none;border-color:var(--acc)}
.cur-btn{height:34px;border:none;border-radius:var(--r1);font-size:13px;font-weight:700;cursor:pointer;transition:background .15s}
.cur-btn.usd{background:var(--blu-l);color:var(--blu)}
.cur-btn.eur{background:var(--grn-l);color:var(--grn)}
.del-btn{background:var(--red-l);color:var(--red);border:none;border-radius:var(--r1);width:30px;height:34px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.del-btn:active{background:#f5c0bb}
.entry-sum{text-align:right;font-size:13px;color:var(--t2);padding-top:6px;border-top:.5px solid var(--bdr);margin-top:2px}
.entry-empty{text-align:center;padding:8px 0;font-size:13px;color:var(--t3)}

/* Save indicator */
.saved-msg{font-size:12px;color:var(--grn);text-align:right;height:18px;transition:opacity .3s}
.saved-msg.hide{opacity:0}

.nav-arr{background:none;border:none;color:var(--acc);font-size:20px;padding:4px 7px;border-radius:var(--r1);line-height:1;transition:background .15s}
.nav-arr:active{background:var(--acc-l)}
.nav-arr-dis{opacity:.25;pointer-events:none}
/* Documents */
.doc-item{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:.5px solid var(--bdr)}
.doc-item:last-child{border-bottom:none;padding-bottom:0}
.doc-item:first-child{padding-top:0}
.doc-ico{width:38px;height:44px;background:var(--red-l);border-radius:var(--r1);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.doc-info{flex:1;min-width:0}
.doc-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-meta{font-size:11px;color:var(--t3);margin-top:2px}
.doc-actions{display:flex;gap:6px;flex-shrink:0}
.doc-btn{border:none;border-radius:var(--r1);padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer}
.doc-btn.view{background:var(--blu-l);color:var(--blu)}
.doc-btn.del{background:var(--red-l);color:var(--red)}
.upload-area{border:1.5px dashed var(--bdr);border-radius:var(--r2);padding:22px 16px;text-align:center;cursor:pointer;transition:border-color .2s}
.upload-area:hover{border-color:var(--acc)}
.upload-area-ico{font-size:28px;margin-bottom:6px}
.upload-area-lbl{font-size:13px;font-weight:600;color:var(--t2)}
.upload-area-sub{font-size:11px;color:var(--t3);margin-top:2px}
.pb-safe{height:max(16px,env(safe-area-inset-bottom))}
</style>
</head>

// App state
let page='home', dayId=0, tab='route';
let expenses={}, mileage={}, rentalCosts={items:[]};
let usdToEur=null; // current exchange rate

// ── IndexedDB für PDF-Dokumente ──────────────────────────────
let db=null;
function initDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('rb26_docs',1);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('docs')){
        const s=d.createObjectStore('docs',{keyPath:'id',autoIncrement:true});
        s.createIndex('dayId','dayId',{unique:false});
      }
    };
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=()=>rej();
  });
}
function dbSaveDoc(dayId,name,size,dataUrl){
  return new Promise((res,rej)=>{
    const tx=db.transaction('docs','readwrite');
    tx.objectStore('docs').add({dayId,name,size,dataUrl,ts:Date.now()});
    tx.oncomplete=()=>res();tx.onerror=()=>rej();
  });
}
function dbGetDocs(dayId){
  return new Promise((res,rej)=>{
    const tx=db.transaction('docs','readonly');
    const req=tx.objectStore('docs').index('dayId').getAll(dayId);
    req.onsuccess=()=>res(req.result);req.onerror=()=>rej();
  });
}
function dbDeleteDoc(id){
  return new Promise((res,rej)=>{
    const tx=db.transaction('docs','readwrite');
    tx.objectStore('docs').delete(id);
    tx.oncomplete=()=>res();tx.onerror=()=>rej();
  });
}

async function loadDocsForDay(dayId){
  const wrap=document.getElementById(`docs-wrap-${dayId}`);
  if(!wrap)return;
  try{
    const docs=await dbGetDocs(dayId);
    wrap.innerHTML=renderDocsList(dayId,docs);
  }catch(e){wrap.innerHTML=`<div style="color:var(--red);font-size:13px;padding:12px">Fehler beim Laden der Dokumente.</div>`;}
}

function renderDocsList(dayId,docs){
  const fmt=b=>b<1024*1024?(b/1024).toFixed(0)+' KB':(b/1024/1024).toFixed(1)+' MB';
  const fmtDate=ts=>new Date(ts).toLocaleDateString('de-DE');
  const list=docs.length
    ? docs.map(d=>`<div class="doc-item">
        <div class="doc-ico">📄</div>
        <div class="doc-info">
          <div class="doc-name">${d.name}</div>
          <div class="doc-meta">${fmt(d.size)} · ${fmtDate(d.ts)}</div>
        </div>
        <div class="doc-actions">
          <button class="doc-btn view" onclick="viewDoc(${d.id})">👁 Öffnen</button>
          <button class="doc-btn del" onclick="delDoc(${d.id},${dayId})">×</button>
        </div>
      </div>`).join('')
    : `<div style="text-align:center;padding:16px 0;font-size:13px;color:var(--t3)">Noch keine Dokumente hochgeladen</div>`;
  return`${list}
    <input type="file" id="file-in-${dayId}" accept=".pdf" style="display:none" onchange="uploadDoc(${dayId},this)">
    <div class="upload-area" onclick="document.getElementById('file-in-${dayId}').click()">
      <div class="upload-area-ico">📎</div>
      <div class="upload-area-lbl">PDF hochladen</div>
      <div class="upload-area-sub">Voucher, Buchungsbestätigung, Eintrittskarte…</div>
    </div>`;
}

async function uploadDoc(dayId,input){
  const file=input.files[0];
  if(!file)return;
  const wrap=document.getElementById(`docs-wrap-${dayId}`);
  if(wrap)wrap.innerHTML=`<div style="text-align:center;padding:20px;color:var(--t3);font-size:13px">⏳ Wird hochgeladen…</div>`;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      await dbSaveDoc(dayId,file.name,file.size,e.target.result);
      await loadDocsForDay(dayId);
    }catch(err){if(wrap)wrap.innerHTML=`<div style="color:var(--red);padding:12px;font-size:13px">Fehler beim Speichern.</div>`;}
  };
  reader.readAsDataURL(file);
}

async function viewDoc(id){
  const tx=db.transaction('docs','readonly');
  const req=tx.objectStore('docs').get(id);
  req.onsuccess=()=>{
    if(!req.result)return;
    const a=document.createElement('a');
    a.href=req.result.dataUrl;
    a.target='_blank';
    a.download=req.result.name;
    a.click();
  };
}

async function delDoc(id,dayId){
  await dbDeleteDoc(id);
  await loadDocsForDay(dayId);
}

function renderDocs(d){
  setTimeout(()=>loadDocsForDay(d.id),30);
  return`<div class="card"><div class="card-hdr"><span class="card-ttl">📄 Dokumente</span></div>
    <div class="card-body" id="docs-wrap-${d.id}">
      <div style="text-align:center;padding:20px;color:var(--t3);font-size:13px">Wird geladen…</div>
    </div></div>`;
}

function loadData(){
  try{expenses=JSON.parse(localStorage.getItem('rb26_exp')||'{}');}catch(e){expenses={};}
  try{mileage=JSON.parse(localStorage.getItem('rb26_mil')||'{}');}catch(e){mileage={};}

  4:[47.609,-124.375],5:[45.523,-122.677],6:[45.523,-122.677],7:[44.058,-121.315],

};

let wxCache={}; // {lat_lon: {date: {tmin,tmax,precip,code}}}

function loadWxCache(){
  try{wxCache=JSON.parse(localStorage.getItem('rb26_wx')||'{}');}catch(e){wxCache={};}
}
function saveWxCache(){localStorage.setItem('rb26_wx',JSON.stringify(wxCache));}

function wxEmoji(code){
  if(code==null)return'❓';
  if(code===0)return'☀️';
  if(code<=3)return'⛅';
  if(code<=48)return'🌫️';
  if(code<=55)return'🌦️';
  if(code<=65)return'🌧️';
  if(code<=77)return'🌨️';
  if(code<=82)return'🌧️';
  return'⛈️';
}
function wxLabel(code){
  if(code==null)return'–';
  if(code===0)return'Klar';if(code<=3)return'Bewölkt';
  if(code<=48)return'Nebel';if(code<=55)return'Nieselregen';
  if(code<=65)return'Regen';if(code<=77)return'Schnee';
  if(code<=82)return'Schauer';return'Gewitter';
}

async function fetchWeatherAll(){
  if(!navigator.onLine)return false;
  // Unique koordinaten-Sets sammeln
  const groups={};
  DAYS.forEach(d=>{
    const c=DAY_COORDS[d.id];
    if(!c)return;
    const key=`${c[0]}_${c[1]}`;
    if(!groups[key])groups[key]={lat:c[0],lon:c[1],days:[]};
    // ISO-Datum berechnen
    const dt=new Date(TRIP_START);dt.setDate(dt.getDate()+d.id);
    groups[key].days.push({id:d.id,date:dt.toISOString().slice(0,10)});
  });
  let anySuccess=false;
  await Promise.all(Object.values(groups).map(async g=>{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${g.lat}&longitude=${g.lon}`+
      `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode`+
      `&timezone=America%2FLos_Angeles&start_date=2026-06-05&end_date=2026-06-24`;
    try{
      const r=await fetch(url);if(!r.ok)return;
      const data=await r.json();
      const key=`${g.lat}_${g.lon}`;
      if(!wxCache[key])wxCache[key]={};
      data.daily.time.forEach((date,i)=>{
        wxCache[key][date]={
          tmax:Math.round(data.daily.temperature_2m_max[i]),
          tmin:Math.round(data.daily.temperature_2m_min[i]),
          precip:data.daily.precipitation_probability_max[i],
          code:data.daily.weathercode[i]
        };
      });
      anySuccess=true;
    }catch(e){}
  }));
  if(anySuccess){
    wxCache._updated=Date.now();
    saveWxCache();
  }
  return anySuccess;
}

function getWxForDay(dayId){
  const c=DAY_COORDS[dayId];if(!c)return null;
  const key=`${c[0]}_${c[1]}`;
  const dt=new Date(TRIP_START);dt.setDate(dt.getDate()+dayId);
  const date=dt.toISOString().slice(0,10);
  return wxCache[key]&&wxCache[key][date]?wxCache[key][date]:null;
}

async function exportBackup(){
  // Alle PDFs aus IndexedDB lesen
  let docs=[];
  try{
    if(db){
      docs=await new Promise((res,rej)=>{
        const tx=db.transaction('docs','readonly');
        const req=tx.objectStore('docs').getAll();
        req.onsuccess=()=>res(req.result);
        req.onerror=()=>rej();
      });
    }
  }catch(e){}

  const data={
    expenses,mileage,rentalCosts,docs,
    wxCache:localStorage.getItem('rb26_wx'),
    rate:localStorage.getItem('rb26_rate'),
    exportedAt:new Date().toISOString()
  };
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`roadbook_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  const count=docs.length;
  if(count>0)setTimeout(()=>alert(`✅ Backup exportiert inkl. ${count} Dokument${count>1?'e':''}`),500);
}

function importBackup(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.expenses){expenses=d.expenses;localStorage.setItem('rb26_exp',JSON.stringify(expenses));}
      if(d.mileage){mileage=d.mileage;localStorage.setItem('rb26_mil',JSON.stringify(mileage));}
      if(d.rentalCosts){rentalCosts=d.rentalCosts;localStorage.setItem('rb26_car',JSON.stringify(rentalCosts));}
      if(d.wxCache)localStorage.setItem('rb26_wx',d.wxCache);
      if(d.rate)localStorage.setItem('rb26_rate',d.rate);
      migrateExpenses();loadWxCache();

      // Dokumente in IndexedDB wiederherstellen
      let docsRestored=0;
      if(d.docs&&d.docs.length&&db){
        // Erst alle alten Docs löschen
        await new Promise((res,rej)=>{
          const tx=db.transaction('docs','readwrite');
          tx.objectStore('docs').clear();
          tx.oncomplete=res;tx.onerror=rej;
        });
        // Dann neue einfügen
        for(const doc of d.docs){
          try{
            await new Promise((res,rej)=>{
              const tx=db.transaction('docs','readwrite');
              // id weglassen damit autoIncrement greift
              const {id,...docData}=doc;
              tx.objectStore('docs').add(docData);
              tx.oncomplete=res;tx.onerror=rej;
            });
            docsRestored++;
          }catch(err){}
        }
      }
      const msg=docsRestored>0
        ?`✅ Backup wiederhergestellt inkl. ${docsRestored} Dokument${docsRestored>1?'e':''}`
        :'✅ Backup erfolgreich wiederhergestellt!';
      alert(msg);
      render();
    }catch(err){alert('❌ Ungültige Backup-Datei');}
  };
  reader.readAsText(file);
}

        <div class="ex-f"><label>Differenz</label><input type="number" readonly value="${mv.actual?mv.actual-d.miles:''}" style="opacity:.55;color:${mv.actual&&mv.actual>d.miles?'var(--red)':'var(--grn)'}" placeholder="–"></div>

        <div class="ex-f"><label>Getankte Gallonen</label><input id="mil-gal-${k}" type="number" step="0.1" placeholder="0.0" value="${mv.gallons||''}" oninput="saveMilField(${k},'gallons',this.value)"></div>

function renderCardEntries(dayKey,cardKey,title,entries){
  const safe=Array.isArray(entries)?entries:[];
  const usd=safe.filter(e=>e.cur!=='eur').reduce((s,e)=>s+(parseFloat(e.amt)||0),0);
  const eur=safe.filter(e=>e.cur==='eur').reduce((s,e)=>s+(parseFloat(e.amt)||0),0);
  const rows=safe.length
    ? safe.map((e,i)=>{
        const cur=e.cur||'usd';
        return`<div class="entry-row">
          <input class="entry-desc" type="text" placeholder="Beschreibung" value="${(e.desc||'').replace(/"/g,'&quot;')}" oninput="updateEntry(${dayKey},'${cardKey}',${i},'desc',this.value)">
          <input class="entry-amt" type="number" step="0.01" placeholder="0.00" value="${e.amt||''}" oninput="updateEntry(${dayKey},'${cardKey}',${i},'amt',this.value)">
          <button class="cur-btn ${cur}" onclick="toggleCur(${dayKey},'${cardKey}',${i})">${cur==='eur'?'€':'$'}</button>
          <button class="del-btn" onclick="removeEntry(${dayKey},'${cardKey}',${i})">×</button>
        </div>`;}).join('')
    : `<div class="entry-empty">Noch keine Ausgaben</div>`;
  const sumParts=[];
  if(usd>0)sumParts.push(`<span style="color:var(--blu)">$${usd.toFixed(2)}</span>`);
  if(eur>0)sumParts.push(`<span style="color:var(--grn)">€${eur.toFixed(2)}</span>`);
  const sumRow=safe.length?`<div class="entry-sum" id="sum-${dayKey}-${cardKey}">Gesamt: <strong>${sumParts.length?sumParts.join(' + '):'–'}</strong></div>`:'';
  return`<div class="card" id="card-${dayKey}-${cardKey}">
    <div class="card-hdr">
      <span class="card-ttl">${title}</span>
      <button class="add-btn" onclick="addEntry(${dayKey},'${cardKey}')">+ Hinzufügen</button>
    </div>
    <div class="card-body" style="gap:7px">${rows}${sumRow}</div>
  </div>`;
}

function renderDayTotal(dayKey){
  const sumUSD=arr=>(Array.isArray(arr)?arr:[]).filter(e=>e.cur!=='eur').reduce((s,e)=>s+(parseFloat(e.amt)||0),0);
  const sumEUR=arr=>(Array.isArray(arr)?arr:[]).filter(e=>e.cur==='eur').reduce((s,e)=>s+(parseFloat(e.amt)||0),0);
  const ex=expenses[dayKey]||{};
  const cards=[['mkk','Marcel KK'],['mdk','Marcel Debit'],['vkk','Vati KK'],['vdk','Vati Debit']];
  const rows=cards.map(([k,lbl])=>{
    const u=sumUSD(ex[k]),r=sumEUR(ex[k]);
    if(!u&&!r)return'';
    const parts=[];
    if(u)parts.push(`<span style="color:var(--blu)">$${u.toFixed(2)}</span>`);
    if(r)parts.push(`<span style="color:var(--grn)">€${r.toFixed(2)}</span>`);
    return`<div class="ir"><span class="ir-l">${lbl}</span><span class="ir-v" style="font-size:13px">${parts.join(' + ')}</span></div>`;
  }).filter(Boolean).join('');
  const totUSD=cards.reduce((s,[k])=>s+sumUSD(ex[k]),0);
  const totEUR=cards.reduce((s,[k])=>s+sumEUR(ex[k]),0);
  if(!totUSD&&!totEUR)return`<div style="text-align:center;padding:20px;font-size:13px;color:var(--t3)">Tagesübersicht erscheint nach Eingabe von Ausgaben</div>`;
  const totParts=[];

  if(totEUR)totParts.push(`<span style="color:var(--grn)">€${totEUR.toFixed(2)}</span>`);
  return`<div class="card"><div class="card-hdr"><span class="card-ttl">Tagesübersicht</span></div><div class="card-body">
    ${rows}
    <div style="border-top:.5px solid var(--bdr);padding-top:8px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-weight:700">Tag gesamt</span><span style="font-weight:700;font-size:14px">${totParts.join(' + ')}</span>

function renderTripTotal(){
  const sumUSD=arr=>(Array.isArray(arr)?arr:[]).filter(e=>e.cur!=='eur').reduce((s,e)=>s+(parseFloat(e.amt)||0),0);
  const sumEUR=arr=>(Array.isArray(arr)?arr:[]).filter(e=>e.cur==='eur').reduce((s,e)=>s+(parseFloat(e.amt)||0),0);
  const cards=[['mkk','Marcel KK'],['mdk','Marcel Debit'],['vkk','Vati KK'],['vdk','Vati Debit']];
  let totals={};cards.forEach(([k])=>totals[k]={usd:0,eur:0});
  const dayRows=DAYS.map(d=>{
    const ex=expenses[d.id]||{};
    let dUSD=0,dEUR=0;
    cards.forEach(([k])=>{totals[k].usd+=sumUSD(ex[k]);totals[k].eur+=sumEUR(ex[k]);dUSD+=sumUSD(ex[k]);dEUR+=sumEUR(ex[k]);});
    if(!dUSD&&!dEUR)return'';
    const p=[];
    if(dUSD)p.push(`<span style="color:var(--blu)">$${dUSD.toFixed(2)}</span>`);
    if(dEUR)p.push(`<span style="color:var(--grn)">€${dEUR.toFixed(2)}</span>`);
    return`<div class="ir" style="cursor:pointer" onclick="goDay(${d.id})">
      <span class="ir-l" style="font-size:11px">${d.date} ${d.tag}</span>
      <span class="ir-v" style="font-size:13px">${p.join(' + ')}</span>

  const grandUSD=cards.reduce((s,[k])=>s+totals[k].usd,0);

  // Gesamtbetrag in Euro

function toggleCur(dayKey,cardKey,idx){
  if(!expenses[dayKey]||!expenses[dayKey][cardKey])return;
  const e=expenses[dayKey][cardKey][idx];
  e.cur=e.cur==='eur'?'usd':'eur';
  saveExp();
  // Re-render just the card to reflect toggle
  const entries=expenses[dayKey][cardKey];
  const cardEl=document.getElementById(`card-${dayKey}-${cardKey}`);
  if(cardEl){cardEl.outerHTML=renderCardEntries(dayKey,cardKey,cardEl.querySelector('.card-ttl').textContent,entries);}
  else render();
}

function renderCarOverview(){

  const items=Array.isArray(rentalCosts.items)?rentalCosts.items:[];

    ? items.map((e,i)=>`<div class="entry-row" style="grid-template-columns:1fr 90px 30px">
        <input class="entry-desc" type="text" placeholder="Beschreibung" value="${(e.desc||'').replace(/"/g,'&quot;')}" oninput="updateCarItem(${i},'desc',this.value)">
        <input class="entry-amt" type="number" step="0.01" placeholder="0.00" value="${e.amt||''}" oninput="updateCarItem(${i},'amt',this.value)">

  // Streckendaten

  const driveDays=DAYS.filter(d=>d.miles>0);
  const totalActMiles=driveDays.reduce((s,d)=>s+(parseFloat((mileage[d.id]||{}).actual)||0),0);
  const totalFuelCost=driveDays.reduce((s,d)=>{
    const mv=mileage[d.id]||{};
    return s+(parseFloat(mv.gallons)||0)*(parseFloat(mv.price)||0);
  },0);
  const totalGallons=driveDays.reduce((s,d)=>s+(parseFloat((mileage[d.id]||{}).gallons)||0),0);
  const avgMpg=totalGallons>0&&totalActMiles>0?(totalActMiles/totalGallons):0;
  const pct=totalEstMiles>0?Math.min(100,Math.round(totalActMiles/totalEstMiles*100)):0;
  const grandTotal=contractTotal+totalFuelCost;

  // Tagesübersicht
  const dayRows=driveDays.map(d=>{
    const mv=mileage[d.id]||{};
    const fc=(parseFloat(mv.gallons)||0)*(parseFloat(mv.price)||0);
    const act=parseFloat(mv.actual)||0;
    return`<div class="ir" style="cursor:pointer;gap:6px" onclick="goDay(${d.id})">
      <span class="ir-l" style="font-size:11px">${d.date} ${d.tag}</span>
      <span style="flex:1;font-size:12px;color:var(--t2)">${act?act+' mi':'–'} / ${d.miles} mi</span>
      <span style="font-size:13px;font-weight:600;color:var(--blu)">${fc?'$'+fc.toFixed(2):'–'}</span>

  return`<div class="nav"><div class="nav-in">
    <button class="nav-back" onclick="page='home';render()">‹ Übersicht</button>
    <span class="nav-title">Mietwagen</span>
    <span class="nav-spc"></span>
  </div></div>
  <div class="day-hero"><div class="hero-tag">Alamo · Premium SUV</div><div class="hero-title">Mietwagen Übersicht</div>
    <div class="hero-route">📍 SeaTac · 05.06. – 24.06.2026</div></div>
  <div class="content">

    <div class="card"><div class="card-hdr"><span class="card-ttl">Mietvertrag & Fixkosten</span>
      <button class="add-btn" onclick="addCarItem()">+ Hinzufügen</button>
    </div><div class="card-body" style="gap:7px">
      ${contractRows}
      ${items.length?`<div class="entry-sum">Gesamt: <strong>$${contractTotal.toFixed(2)}</strong></div>`:''}
    </div></div>

    <div class="card"><div class="card-hdr"><span class="card-ttl">Gesamtstrecke & Verbrauch</span></div><div class="card-body">
      <div class="car-stat-grid">
        <div class="car-stat"><span class="car-stat-n">${totalActMiles?totalActMiles.toLocaleString('de-DE'):'-'}</span><span class="car-stat-l">Gefahrene Meilen</span></div>
        <div class="car-stat"><span class="car-stat-n">${totalEstMiles.toLocaleString('de-DE')}</span><span class="car-stat-l">Geplante Meilen</span></div>
        <div class="car-stat"><span class="car-stat-n">${totalGallons?totalGallons.toFixed(1)+' gal':'-'}</span><span class="car-stat-l">Getankt gesamt</span></div>
        <div class="car-stat"><span class="car-stat-n">${avgMpg?avgMpg.toFixed(1)+' mpg':'-'}</span><span class="car-stat-l">Ø Verbrauch</span></div>
      </div>
      ${totalActMiles?`<div style="margin-top:4px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-bottom:4px"><span>Fortschritt</span><span>${pct}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>`:''}
    </div></div>

    <div class="card"><div class="card-hdr"><span class="card-ttl">Kosten Zusammenfassung</span></div><div class="card-body">
      ${contractTotal?`<div class="ir"><span class="ir-l">Mietvertrag</span><span class="ir-v">$${contractTotal.toFixed(2)}</span></div>`:''}
      ${totalFuelCost?`<div class="ir"><span class="ir-l">⛽ Sprit gesamt</span><span class="ir-v" style="color:var(--blu)">$${totalFuelCost.toFixed(2)}</span></div>`:''}
      ${grandTotal?`<div style="border-top:.5px solid var(--bdr);padding-top:8px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:700">Gesamt</span>
        <span style="font-weight:700;color:var(--acc);font-size:18px">$${grandTotal.toFixed(2)}</span>
      </div>`:(!contractTotal&&!totalFuelCost?`<div class="entry-empty">Noch keine Daten eingetragen</div>`:'')}
    </div></div>

    <div class="card"><div class="card-hdr"><span class="card-ttl">Fahrtenbuch</span></div><div class="card-body" style="gap:6px">
      ${dayRows}
    </div></div>

  </div><div class="pb-safe"></div>`;
}

function addCarItem(){
  if(!rentalCosts.items)rentalCosts.items=[];
  rentalCosts.items.push({desc:'',amt:''});
  saveCar();render();
}
function removeCarItem(idx){
  rentalCosts.items.splice(idx,1);
  saveCar();render();
}
function updateCarItem(idx,field,val){
  if(!rentalCosts.items[idx])rentalCosts.items[idx]={};
  rentalCosts.items[idx][field]=val;
  saveCar();
  const total=rentalCosts.items.reduce((s,e)=>s+(parseFloat(e.amt)||0),0);
  const el=document.querySelector('.entry-sum');
  if(el)el.innerHTML=`Gesamt: <strong>$${total.toFixed(2)}</strong>`;
}
function addEntry(dayKey,cardKey){
  if(!expenses[dayKey])expenses[dayKey]={};
  if(!expenses[dayKey][cardKey])expenses[dayKey][cardKey]=[];
  expenses[dayKey][cardKey].push({desc:'',amt:'',cur:'usd'});
  saveExp();
  render();
}

function removeEntry(dayKey,cardKey,idx){
  if(!expenses[dayKey]||!expenses[dayKey][cardKey])return;
  expenses[dayKey][cardKey].splice(idx,1);
  saveExp();
  render();
}

function updateEntry(dayKey,cardKey,idx,field,val){
  if(!expenses[dayKey])expenses[dayKey]={};
  if(!expenses[dayKey][cardKey])expenses[dayKey][cardKey]=[];
  if(!expenses[dayKey][cardKey][idx])expenses[dayKey][cardKey][idx]={cur:'usd'};
  expenses[dayKey][cardKey][idx][field]=val;
  saveExp();
  const entries=expenses[dayKey][cardKey];
  const usd=entries.filter(e=>e.cur!=='eur').reduce((s,e)=>s+(parseFloat(e.amt)||0),0);
  const eur=entries.filter(e=>e.cur==='eur').reduce((s,e)=>s+(parseFloat(e.amt)||0),0);
  const parts=[];
  if(usd>0)parts.push(`<span style="color:var(--blu)">$${usd.toFixed(2)}</span>`);
  if(eur>0)parts.push(`<span style="color:var(--grn)">€${eur.toFixed(2)}</span>`);
  const sumEl=document.getElementById(`sum-${dayKey}-${cardKey}`);
  if(sumEl)sumEl.innerHTML=`Gesamt: <strong>${parts.length?parts.join(' + '):'–'}</strong>`;
}

function saveMilField(id,field,val){
  if(!mileage[id])mileage[id]={};
  mileage[id][field]=val;
  saveMil();
  // Live-Update Tankkosten
  const mv=mileage[id];
  const cost=(parseFloat(mv.gallons)||0)*(parseFloat(mv.price)||0);
  const el=document.getElementById(`fuel-cost-${id}`);
  if(el){
    el.textContent=cost>0?`$${cost.toFixed(2)}`:'–';
    el.closest('.fuel-cost').style.opacity=cost>0?'1':'0.45';
  }
  // Live-Update Differenz
  const diffEl=document.querySelector(`#mil-act-${id}`)?.closest('.mileage-row')?.nextElementSibling?.querySelector('input[readonly]');
  if(diffEl&&mv.actual){
    const day=DAYS.find(d=>d.id===id);
    diffEl.value=mv.actual-(day?day.miles:0);
  }
}

  if(b)b.style.display=navigator.onLine?'none':'block';
}
window.addEventListener('online',updateOfflineBanner);
window.addEventListener('offline',updateOfflineBanner);
updateOfflineBanner();

// Service Worker nur außerhalb der Claude-Vorschau registrieren
if('serviceWorker' in navigator && !location.hostname.includes('claudeusercontent.com')){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./service-worker.js')
      .then(()=>console.log('Service Worker aktiv'))
      .catch(e=>console.warn('SW Fehler:',e));
  });
}

render();
</script>
</body>
</html>
